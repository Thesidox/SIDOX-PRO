<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0F172A"/>
  <meta name="description" content="SIDOX EDU - منصة تعليمية لدورات AutoCAD و Covadis"/>
  <title>SIDOX EDU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0F172A;color:#F1F5F9;font-family:'Cairo',sans-serif}
    #root{min-height:100vh}
    .initial-loader{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem}
    .initial-loader .ring{width:56px;height:56px;border:4px solid #1E293B;border-top:4px solid #3B82F6;border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <noscript>يجب تفعيل JavaScript.</noscript>
  <div id="root">
    <div class="initial-loader"><div class="ring"></div><p>SIDOX EDU...</p></div>
  </div>
</body>
</html>
